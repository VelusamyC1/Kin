spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/kin
    username: ${DB_USERNAME:kin}
    password: ${DB_PASSWORD:kin}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

kin:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-must-be-at-least-32-chars}
    access-token-expiry-ms: 900000       # 15 minutes
    refresh-token-expiry-days: 30

logging:
  level:
    com.kin: DEBUG
    org.flywaydb: INFO

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
  flyway:
    locations: classpath:db/migration,classpath:db/seed
